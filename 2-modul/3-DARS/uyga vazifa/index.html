<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Travel Poster</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <center>
        <div class="overlay">
            <h1 class="title">Explore the World</h1>

            <div class="card">
                <h2>Why Travel With Us?</h2>
                <p>Discover the most beautiful places around the world.</p>
                <p>Comfortable trips with professional guides.</p>
            </div>

            <div class="card">
                <h2>Travel Plans</h2>
                <table>
                    <tr>
                        <th>Destination</th>
                        <th>Days</th>
                        <th>Price</th>
                    </tr>
                    <tr>
                        <td>Paris</td>
                        <td>5</td>
                        <td>$1200</td>
                    </tr>
                    <tr>
                        <td>Dubai</td>
                        <td>4</td>
                        <td>$900</td>
                    </tr>
                    <tr>
                        <td>Maldives</td>
                        <td>6</td>
                        <td>$1800</td>
                    </tr>
                </table>
            </div>

            <div class="card light">
                <h2>Book Your Trip</h2>

                <form>
                    <label>Name:</label>
                    <input type="text">

                    <label>Email:</label>
                    <input type="email">

                    <label>Destination:</label>
                    <select>
                        <option>Paris</option>
                        <option>Dubai</option>
                        <option>Maldives</option>
                    </select>

                    <button type="submit">Send</button>
                </form>
            </div>
        </div>
    </center>
</body>

</html>

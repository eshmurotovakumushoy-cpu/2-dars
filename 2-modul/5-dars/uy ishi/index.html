<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Special Menu</title>

</head>
<body>

<section class="menu">

            <span class="price">12 K</span>

        <div class="menu-card">
            <img src="./rasmlar/unsplash_SqYmTDQYMjo (1).png" alt="">

     <img src="./rasmlar/unsplash_SqYmTDQYMjo (3).png" alt="">
